<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842"/>
      <stop offset="100%" style="stop-color:#C9952A"/>
    </linearGradient>
  </defs>
  <!-- 배경 라운드 사각형 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 테두리 골드 링 -->
  <rect x="16" y="16" width="480" height="480" rx="88" fill="none" stroke="url(#gold)" stroke-width="12" opacity="0.6"/>
  <!-- S -->
  <text x="92" y="340" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="260" fill="url(#gold)">S</text>
  <!-- B -->
  <text x="258" y="340" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="260" fill="url(#gold)" opacity="0.75">B</text>
  <!-- 하단 라인 장식 -->
  <rect x="80" y="370" width="352" height="6" rx="3" fill="url(#gold)" opacity="0.4"/>
</svg>
